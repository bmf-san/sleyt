<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 337" width="900" height="337">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f6b8e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="337" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="60" r="120" fill="#ffffff" opacity="0.04"/>
  <circle cx="820" cy="280" r="80" fill="#ffffff" opacity="0.05"/>
  <circle cx="100" cy="300" r="100" fill="#ffffff" opacity="0.03"/>
  <!-- Envelope icon area -->
  <rect x="320" y="80" width="260" height="180" rx="12" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Envelope flap -->
  <polyline points="320,80 450,175 580,80" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Lines inside envelope (representing text) -->
  <line x1="360" y1="155" x2="540" y2="155" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
  <line x1="360" y1="175" x2="510" y2="175" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>
  <line x1="360" y1="195" x2="480" y2="195" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="450" y="305" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.5" text-anchor="middle" letter-spacing="2">NEWSLETTER</text>
</svg>
